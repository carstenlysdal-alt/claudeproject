<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Forslag C — Vandrette bånd</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=JetBrains+Mono:wght@500;700&family=Schibsted+Grotesk:wght@400;500&family=Source+Serif+4:ital,opsz,wght@1,8..60,300&display=swap" rel="stylesheet">
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#ECEAE4;-webkit-font-smoothing:antialiased}
.stage{position:absolute;left:0;top:0;width:1920px;height:1080px;transform-origin:0 0;
  background:#FAFAF8;display:flex;flex-direction:column}

.hdr{height:64px;display:flex;align-items:center;justify-content:space-between;
  padding:0 52px;border-bottom:1px solid #E4E2DD;flex-shrink:0;background:rgba(250,250,248,.97)}
.brand{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:#361352;font-style:italic}
.brand b{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.2em;color:#7C7972;font-style:normal;margin-left:14px}
.slide-id{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#7C7972}

.bands{flex:1;display:flex;flex-direction:column;overflow:hidden}

.band{
  display:flex;align-items:stretch;
  border-bottom:1px solid #E4E2DD;
  cursor:pointer;
  transition:flex .38s cubic-bezier(.22,.61,.36,1), background .15s ease;
  flex:1;
  overflow:hidden;
  position:relative;
}
.band.open{flex:4}
.band:last-child{border-bottom:none}
.band:hover:not(.open){background:#F4F2EC}

/* Left color strip (6px full height) */
.band-color{width:6px;flex-shrink:0;transition:width .2s ease}
.band.open .band-color{width:6px}

/* Collapsed: number + name inline */
.band-collapsed{
  display:flex;align-items:center;gap:20px;
  padding:0 28px;
  flex:1;
  opacity:1;transition:opacity .15s ease;
}
.band.open .band-collapsed{opacity:0;pointer-events:none;width:0;padding:0;flex:0;overflow:hidden}
.bc-num{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;flex-shrink:0}
.bc-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#100C0C;letter-spacing:-.01em;flex-shrink:0}
.bc-func{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#7C7972;flex-shrink:0}
.bc-q{font-family:'Source Serif 4',serif;font-size:13px;font-style:italic;font-weight:300;color:#7C7972;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;min-width:0}

/* Open */
.band-open{
  display:flex;flex:1;opacity:0;transition:opacity .2s ease .18s;
  overflow:hidden;
}
.band.open .band-open{opacity:1}

.bo-left{
  width:360px;flex-shrink:0;padding:20px 0 20px 28px;
  display:flex;flex-direction:column;
  border-right:1px solid #E4E2DD;
}
.bo-num{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}
.bo-name{font-family:'Playfair Display',serif;font-size:40px;font-weight:700;line-height:1;letter-spacing:-.02em;color:#100C0C;margin-bottom:6px}
.bo-func{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#7C7972;margin-bottom:auto}
.bo-tier{font-family:'JetBrains Mono',monospace;font-size:7.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border:1px solid;display:inline-block;margin-top:14px}
.bo-tier.free{color:#A75D46;border-color:rgba(167,93,70,.4)}
.bo-tier.paid{color:#361352;border-color:rgba(54,19,82,.25)}

.bo-right{flex:1;padding:20px 44px;display:flex;flex-direction:column;overflow:hidden}
.bo-q{font-family:'Source Serif 4',serif;font-size:20px;font-style:italic;font-weight:300;
  color:#100C0C;line-height:1.45;margin-bottom:14px;max-width:60ch}
.bo-desc{font-family:'Schibsted Grotesk',sans-serif;font-size:14px;color:#44413C;line-height:1.6;max-width:65ch;margin-bottom:12px}
.bo-insight{background:rgba(196,148,78,.09);padding:9px 13px;
  font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:#44413C;line-height:1.5;max-width:65ch;margin-top:auto}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="hdr">
    <div class="brand">Y<b>Business</b></div>
    <div class="slide-id">04 · Formater</div>
  </div>
  <div class="bands" id="bands"></div>
</div>
<script>
const s=Math.min(window.innerWidth/1920,window.innerHeight/1080);
const st=document.getElementById('stage');
st.style.transform=`translate(${(window.innerWidth-1920*s)/2}px,${(window.innerHeight-1080*s)/2}px) scale(${s})`;

const F=[
  {num:'01',name:'Brancheoverblikket',func:'Orienteringen',tier:'paid',color:'#5A4A72',
   q:'"Hvad er sket i min branche siden sidst?"',
   desc:'Personaliseret efter branche, region, emner og adfærd. Leveret inden du åbner din første mail.',
   insight:'Det er ikke et fælles opslagstavleprodukt.'},
  {num:'02',name:'Morgenbriefet',func:'Vanen',tier:'free',color:'#A75D46',
   q:'"Hvad skal jeg forstå, inden arbejdsdagen begynder?"',
   desc:'Leveres kl. 06.30 i 5–7 punkter på tekst og lyd. Ingen mur, ingen registrering. 20 % af indholdet · fri adgang.',
   insight:'Rekrutteringskanal til abonnementet.'},
  {num:'03',name:'Det betyder det',func:'Nytten',tier:'paid',color:'#2E5F9A',
   q:'"Hvad betyder det her konkret for min virksomhed?"',
   desc:'Fast 6-punkt-struktur, aldrig en konklusion uden konsekvens. Ugentligt + ad hoc ved lovforslag.',
   insight:'Forklaringsformatet der gør dig klogere end dem der kun læste overskriften.'},
  {num:'04',name:'Den blinde vinkel',func:'Kanten',tier:'paid',color:'#2F3E4C',
   q:'"Hvad overser den dominerende fortælling?"',
   desc:'En redaktionel disciplin, ikke et temperament. Kræver altid en navngivet modkilde.',
   insight:null},
  {num:'05',name:'Casen der virker',func:'Læringen',tier:'paid',color:'#4A2B6A',
   q:'"Hvad kan andre bruge — og hvad kan de ikke kopiere?"',
   desc:'Friktion, fejl og konkret resultat dokumenteret med tal. Cases i første person — aldrig anonyme.',
   insight:'Praksis frem for teori. Ingen anonyme eksempler. Altid navngivet afsender.'},
  {num:'06',name:'Signalradaren',func:'Forspringet',tier:'paid',color:'#8C6D28',
   q:'"Hvad er ved at ske — og hvem ser det ikke endnu?"',
   desc:'AI scanner 5.000 kilder og identificerer svage signaler der endnu ikke er nyheder.',
   insight:'Se mønstre 6–18 måneder før dine konkurrenter.'},
  {num:'07',name:'Blind Spot',func:'Signalmotoren',tier:'paid',color:'#1A3A6A',
   q:'"Hvad gør nyhedslogikken svært at se?"',
   desc:'Systemet finder sprækken: dokumenteret hul, skæv fortælling, fraværende kilde. Journalisten triggerer — systemet returnerer signal med årsag.',
   insight:'Ankerformatet. Det format du husker — og grunden til at du kommer tilbage.'},
  {num:'+3',name:'Situationsformater',func:'Skalerbare',tier:'paid',color:'#7C7972',
   q:'"Journalistikken skifter gear, når situationen kræver det."',
   desc:'Myten om · Før mødet · Før handlen — tre situationsudløste formater på bestilling.',
   insight:null},
  {num:'08',name:'Klummerne',func:'Stemmen',tier:'paid',color:'#3B5949',
   q:'"Den personlige vurdering, erfaringen og ansvaret — med navn under."',
   desc:'Et menneske med navn under. Faste skribenter om hi-tech, AI og erhvervsledelse. For at udfordre redaktionen, ikke spejle den.',
   insight:'AI kan opsummere. Den kan ikke have noget på spil.'},
];

let openIdx=1;
const bandsEl=document.getElementById('bands');

F.forEach((f,i)=>{
  const b=document.createElement('div');
  b.className='band'+(i===openIdx?' open':'');
  b.innerHTML=`
    <div class="band-color" style="background:${f.color}"></div>
    <div class="band-collapsed">
      <span class="bc-num" style="color:${f.color}">${f.num}</span>
      <span class="bc-name">${f.name}</span>
      <span class="bc-func">${f.func}</span>
      <span class="bc-q">${f.q}</span>
    </div>
    <div class="band-open">
      <div class="bo-left">
        <div class="bo-num" style="color:${f.color}">${f.num} · ${f.tier==='free'?'GRATIS':'BETALT'}</div>
        <div class="bo-name">${f.name}</div>
        <div class="bo-func">${f.func}</div>
        <span class="bo-tier ${f.tier}">${f.tier==='free'?'Gratis':'Abonnement'}</span>
      </div>
      <div class="bo-right">
        <div class="bo-q">${f.q}</div>
        <div class="bo-desc">${f.desc}</div>
        ${f.insight?`<div class="bo-insight">${f.insight}</div>`:''}
      </div>
    </div>`;
  b.addEventListener('click',()=>{
    document.querySelectorAll('.band').forEach((x,j)=>x.classList.toggle('open',j===i));
    openIdx=i;
  });
  bandsEl.appendChild(b);
});
</script>
</body>
</html>
