<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y Business — 04 · Formater</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=JetBrains+Mono:wght@400;500;700&family=Schibsted+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">
<style>
/* === VIEWPORT === */
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#ECEAE4;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.deck-viewport{position:fixed;inset:0;overflow:hidden;background:#ECEAE4}
.deck-stage{position:absolute;left:0;top:0;width:1920px;height:1080px;
  overflow:hidden;transform-origin:0 0}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.1ms!important}}

/* === TOKENS === */
:root{
  --paper:#FAFAF8;
  --ink:#100C0C;
  --ink70:#44413C;
  --muted:#7C7972;
  --line:#E4E2DD;
  --line2:#ECEAE4;
  --tint:#F4F2EC;
  --accent:#361352;
  --serif:'Playfair Display',Georgia,serif;
  --mono:'JetBrains Mono',monospace;
  --sans:'Schibsted Grotesk',system-ui,sans-serif;
  --ps:'Source Serif 4',Georgia,serif;
  --ease:cubic-bezier(.22,.61,.36,1);
  --fc:#361352; /* format color — overridden per slide */
}

/* === HEADER === */
.hdr{
  position:absolute;top:0;left:0;right:0;height:64px;z-index:60;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 52px;
  background:rgba(250,250,248,.97);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(20px);
}
.brand{font-family:var(--serif);font-size:21px;font-weight:700;color:var(--accent);font-style:italic}
.brand b{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.2em;
  color:var(--muted);font-style:normal;margin-left:14px;vertical-align:middle}
.slide-id{font-family:var(--mono);font-size:10px;font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}

/* === SLIDE LAYER === */
.slide{
  position:absolute;top:64px;left:0;right:0;bottom:52px;
  display:flex;
  background:var(--paper);
  /* Atmosfærisk format-farvetone som baggrund */
  background-color:var(--paper);
  opacity:0;pointer-events:none;
  transition:opacity .28s var(--ease);
  will-change:opacity;
}
.slide.active{opacity:1;pointer-events:auto}

/* Mørk variant for Blind Spot */
.slide.dark{background:#0C1929}

/* Farvetone overlay */
.slide::before{
  content:'';position:absolute;inset:0;
  background:var(--fc);
  opacity:.045;
  pointer-events:none;
}
.slide.dark::before{opacity:.12}

/* === VENSTRE IDENTITET === */
.s-left{
  width:540px;flex-shrink:0;
  display:flex;flex-direction:column;
  padding:52px 0 44px 52px;
  position:relative;z-index:1;
}
/* Vertikal divider */
.s-left::after{
  content:'';position:absolute;right:0;top:44px;bottom:44px;
  width:1px;background:var(--line);
}
.slide.dark .s-left::after{background:rgba(255,255,255,.08)}

.s-eyebrow{
  font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;
  color:var(--fc);margin-bottom:20px;
  opacity:.9;
}
.slide.dark .s-eyebrow{color:rgba(147,197,253,.7)}

.s-name{
  font-family:var(--serif);font-weight:700;
  line-height:1.0;letter-spacing:-.02em;
  color:var(--ink);
  margin-bottom:16px;
  flex-shrink:0;
}
.slide.dark .s-name{color:#F0ECE3}

.s-func{
  font-family:var(--mono);font-size:11px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);margin-bottom:0;
}
.slide.dark .s-func{color:rgba(255,255,255,.35)}

/* Spacer fills remaining space */
.s-spacer{flex:1}

/* Tier + freq */
.s-meta{margin-bottom:18px}
.s-tier{
  font-family:var(--mono);font-size:8px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border:1px solid;margin-bottom:8px;
}
.s-tier.free{color:#A75D46;border-color:rgba(167,93,70,.4)}
.s-tier.paid{color:var(--fc);border-color:rgba(var(--fc-rgb),.3)}
.slide.dark .s-tier.paid{color:rgba(147,197,253,.8);border-color:rgba(147,197,253,.3)}

.s-freq{
  font-family:var(--mono);font-size:9px;font-weight:500;
  letter-spacing:.1em;color:var(--muted);
  display:block;
}
.slide.dark .s-freq{color:rgba(255,255,255,.3)}

/* Pillar tags */
.s-pillars{display:flex;gap:5px;flex-wrap:wrap}
.s-pill{
  font-family:var(--mono);font-size:7.5px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  padding:3px 9px;border:1px solid;
}
.s-pill.u{color:#16A34A;border-color:rgba(22,163,74,.35)}
.s-pill.c{color:var(--accent);border-color:rgba(54,19,82,.28)}
.s-pill.i{color:#9E8059;border-color:rgba(158,128,89,.38)}
.slide.dark .s-pill.c{color:rgba(147,197,253,.9);border-color:rgba(147,197,253,.35)}

/* === HØJRE INDHOLD === */
.s-right{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  padding:52px 80px 44px 64px;
  overflow:hidden;
  position:relative;z-index:1;
}

/* Spørgsmålet — det store editorielle statement */
.s-q{
  font-family:var(--ps);font-size:28px;font-style:italic;font-weight:300;
  line-height:1.45;
  color:var(--ink);
  margin-bottom:28px;
  max-width:68ch;
  flex-shrink:0;
}
.slide.dark .s-q{color:#E8E0D4}

/* Lead / intro */
.s-lead{
  font-family:var(--serif);font-size:17px;font-weight:700;
  letter-spacing:-.01em;line-height:1.4;
  color:var(--fc);
  margin-bottom:14px;
  flex-shrink:0;
}
.slide.dark .s-lead{color:rgba(147,197,253,.9)}

/* Beskrivelse */
.s-desc{
  font-family:var(--sans);font-size:17px;font-weight:400;
  line-height:1.7;color:var(--ink70);
  max-width:72ch;
  margin-bottom:20px;
  flex-shrink:0;
}
.slide.dark .s-desc{color:rgba(232,224,212,.75)}

/* Indsigt — baggrundstint, ingen border-left */
.s-insight{
  background:rgba(var(--fc-rgb),.08);
  padding:13px 18px;
  font-family:var(--ps);font-size:15px;font-style:italic;font-weight:300;
  color:var(--ink70);line-height:1.55;
  margin-bottom:18px;
  flex-shrink:0;
  max-width:72ch;
}
.slide.dark .s-insight{background:rgba(147,197,253,.09);color:rgba(232,224,212,.8)}

/* Citat (Klummerne) */
.s-quote{
  font-family:var(--ps);font-size:20px;font-style:italic;font-weight:400;
  line-height:1.45;
  color:var(--ink);
  margin-bottom:18px;
  padding:14px 0;
  flex-shrink:0;
}
.slide.dark .s-quote{color:#E8E0D4}

/* Special note (ingen border-left) */
.s-note{
  background:rgba(var(--fc-rgb),.06);
  padding:10px 16px;
  margin-bottom:16px;
  max-width:72ch;
  flex-shrink:0;
}
.s-note-lbl{font-family:var(--mono);font-size:8px;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;color:var(--fc);margin-bottom:4px}
.s-note-txt{font-family:var(--sans);font-size:13px;color:var(--ink70);line-height:1.5}
.slide.dark .s-note{background:rgba(59,130,246,.1)}
.slide.dark .s-note-lbl{color:rgba(147,197,253,.8)}
.slide.dark .s-note-txt{color:rgba(232,224,212,.7)}

/* Stat badge (Morgenbriefet) */
.s-stat{
  font-family:var(--mono);font-size:10px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--fc);
  margin-bottom:16px;
  flex-shrink:0;
}

/* Grid 3×2 (Blind Spot) */
.s-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:6px;
  margin-bottom:14px;max-width:900px;flex-shrink:0;
}
.s-gi{
  padding:10px 13px;
  background:rgba(59,130,246,.08);
  border-top:1px solid rgba(59,130,246,.4);
}
.s-gi-lbl{font-family:var(--mono);font-size:8px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:rgba(147,197,253,.85);margin-bottom:4px}
.s-gi-txt{font-family:var(--sans);font-size:11px;
  color:rgba(232,224,212,.75);line-height:1.45}

/* Grundregel (Blind Spot) */
.s-grundregel{
  background:#0F1E35;
  padding:11px 16px;
  margin-bottom:14px;
  max-width:900px;flex-shrink:0;
}
.s-grundregel-lbl{font-family:var(--mono);font-size:8px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  color:rgba(147,197,253,.65);margin-bottom:4px}
.s-grundregel-txt{font-family:var(--sans);font-size:12px;
  color:rgba(147,197,253,.9);line-height:1.55}

/* Situationsformater kolumner */
.s-cols{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  margin-bottom:16px;max-width:900px;flex-shrink:0;
}
.s-col{
  padding:14px 16px;
  background:rgba(var(--fc-rgb),.06);
  border-top:1px solid rgba(var(--fc-rgb),.3);
}
.s-col-n{font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--fc);margin-bottom:6px}
.s-col-txt{font-family:var(--sans);font-size:13px;color:var(--ink70);line-height:1.5}

/* Klumme-kolumner (roman tal) */
.s-klumme-cols{
  display:flex;flex-direction:column;gap:6px;
  margin-bottom:16px;max-width:620px;flex-shrink:0;
}
.s-klumme-col{
  display:flex;align-items:baseline;gap:12px;
  padding:9px 14px;
  background:rgba(59,89,73,.07);
}
.s-klumme-n{font-family:var(--mono);font-size:9px;font-weight:700;
  color:rgba(59,89,73,.75);letter-spacing:.06em;flex-shrink:0;min-width:22px}
.s-klumme-txt{font-family:var(--sans);font-size:13px;color:var(--ink70);line-height:1.4}

/* Q&A protokol */
.s-proto{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;
  background:rgba(74,55,78,.08);
  margin-bottom:16px;flex-shrink:0;
}
.s-proto-lbl{font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}
.s-proto-txt{font-family:var(--sans);font-size:12px;color:var(--ink70)}

/* Ingen navngivet badge (Klummerne) */
.s-navngivet{
  font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:rgba(59,89,73,.8);margin-bottom:12px;flex-shrink:0;
  display:flex;align-items:center;gap:6px;
}
.s-navngivet::before{content:'';width:6px;height:6px;border-radius:50%;
  background:rgba(59,89,73,.7);flex-shrink:0}

/* Kilder */
.s-sources{
  font-family:var(--mono);font-size:10px;font-weight:500;
  color:var(--muted);line-height:1.5;
  margin-top:auto;padding-top:12px;
  border-top:1px solid var(--line2);
  flex-shrink:0;
}
.slide.dark .s-sources{color:rgba(255,255,255,.28);border-top-color:rgba(255,255,255,.07)}
.s-sources b{font-weight:700;color:var(--fc);margin-right:3px}
.slide.dark .s-sources b{color:rgba(147,197,253,.6)}

/* === BOTTOM NAVIGATION === */
.bot{
  position:absolute;bottom:0;left:0;right:0;height:52px;z-index:60;
  display:flex;align-items:center;
  padding:0 52px;gap:0;
  background:rgba(250,250,248,.97);
  border-top:1px solid var(--line);
  backdrop-filter:blur(20px);
}

/* Pil */
.bot-arrow{
  font-family:var(--mono);font-size:12px;color:var(--muted);
  cursor:pointer;padding:4px 10px;
  background:none;border:none;
  transition:color .15s ease;
  flex-shrink:0;
}
.bot-arrow:hover{color:var(--ink)}

/* Format-numre */
.bot-nav{
  display:flex;align-items:center;gap:2px;
  flex:1;justify-content:center;
}
.bot-item{
  font-family:var(--mono);font-size:8.5px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  padding:5px 10px;cursor:pointer;
  color:var(--muted);
  border:1px solid transparent;
  transition:color .15s ease, border-color .15s ease, background .15s ease;
  white-space:nowrap;
}
.bot-item:hover{color:var(--ink70)}
.bot-item.active{
  color:var(--fc-active,var(--accent));
  border-color:rgba(var(--fc-rgb-active,54,19,82),.3);
  background:rgba(var(--fc-rgb-active,54,19,82),.05);
}

/* Counter */
.bot-count{
  font-family:var(--mono);font-size:9px;font-weight:500;
  letter-spacing:.14em;color:var(--muted);
  opacity:.55;flex-shrink:0;
  padding-left:14px;
}

/* === ENTRY === */
@keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes contentUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hdr{animation:slideDown .4s var(--ease) both}
.bot{animation:slideDown .38s var(--ease) .05s both}
.slide.active .s-eyebrow{animation:contentUp .4s var(--ease) .05s both}
.slide.active .s-name{animation:contentUp .45s var(--ease) .08s both}
.slide.active .s-func{animation:contentUp .4s var(--ease) .11s both}
.slide.active .s-q{animation:contentUp .5s var(--ease) .1s both}
.slide.active .s-lead{animation:contentUp .42s var(--ease) .13s both}
.slide.active .s-desc{animation:contentUp .44s var(--ease) .16s both}
</style>
</head>
<body>
<div class="deck-viewport">
<div class="deck-stage" id="stage">

<div class="hdr">
  <div class="brand">Y<b>Business</b></div>
  <div class="slide-id">04 · Formater</div>
</div>

<div id="slides"></div>

<div class="bot">
  <button class="bot-arrow" id="prev" aria-label="Forrige">←</button>
  <div class="bot-nav" id="botNav"></div>
  <span class="bot-count" id="botCount"></span>
  <button class="bot-arrow" id="next" aria-label="Næste">→</button>
</div>

</div>
</div>
<script>
/* === SCALE === */
const stageEl=document.getElementById('stage');
function scaleStage(){
  const s=Math.min(window.innerWidth/1920,window.innerHeight/1080);
  stageEl.style.transform=
    `translate(${(window.innerWidth-1920*s)/2}px,${(window.innerHeight-1080*s)/2}px) scale(${s})`;
}
scaleStage(); window.addEventListener('resize',scaleStage);

/* === FORMAT DATA — merged fra s4-spotlight-scanner.html + yredaktion-dashboard S4 === */
const F=[

/* Navnestørrelse baseret på displaynavn-længde */
function nameSize(name){
  const l=name.length;
  if(l<=9) return '88px';
  if(l<=13) return '78px';
  if(l<=16) return '70px';
  return '62px';
}

/* Pillar tags HTML */
function pillars(fmt,dark){
  const map={u:'Understand',c:'Challenge',i:'Inspire'};
  return fmt.pillars.map(p=>`<span class="s-pill ${p}">${map[p]}</span>`).join('');
}

/* Special indhold */
function special(fmt){
  if(!fmt.special) return '';
  const s=fmt.special;
  if(s.type==='stat') return `<div class="s-stat">${s.txt}</div>`;
  if(s.type==='proto') return `<div class="s-proto">
    <span class="s-proto-lbl">${s.lbl}</span>
    <span class="s-proto-txt">${s.desc}</span>
  </div>`;
  if(s.type==='note') return `<div class="s-note">
    <div class="s-note-lbl">${s.lbl}</div>
    <div class="s-note-txt">${s.desc}</div>
  </div>`;
  if(s.type==='cols') return `<div class="s-cols">
    ${s.items.map(it=>`<div class="s-col">
      <div class="s-col-n">${it.n}</div>
      <div class="s-col-txt">${it.txt}</div>
    </div>`).join('')}
  </div>`;
  if(s.type==='blindspot') return `
    <div class="s-grid">
      ${s.items.map(it=>`<div class="s-gi">
        <div class="s-gi-lbl">${it.l}</div>
        <div class="s-gi-txt">${it.d}</div>
      </div>`).join('')}
    </div>
    <div class="s-grundregel">
      <div class="s-grundregel-lbl">Grundregel</div>
      <div class="s-grundregel-txt">${s.grundregel}</div>
    </div>`;
  if(s.type==='klumme') return `
    <div class="s-quote">${s.quote}</div>
    <div class="s-navngivet">${s.note}</div>
    <div class="s-klumme-cols">
      ${s.cols.map(c=>`<div class="s-klumme-col">
        <span class="s-klumme-n">${c.n}</span>
        <span class="s-klumme-txt">${c.txt}</span>
      </div>`).join('')}
    </div>`;
  return '';
}

/* === BYGG SLIDES === */
const slidesEl=document.getElementById('slides');
const botNav=document.getElementById('botNav');

F.forEach((fmt,i)=>{
  /* Slide */
  const slide=document.createElement('div');
  slide.className='slide'+(fmt.dark?' dark':'');
  slide.style.setProperty('--fc',fmt.color);
  slide.style.setProperty('--fc-rgb',fmt.colorRgb);
  slide.innerHTML=`
    <div class="s-left">
      <div class="s-eyebrow">${fmt.eyebrow}</div>
      <div class="s-name" style="font-size:${nameSize(fmt.nameDisplay)};white-space:pre-line">${fmt.name}</div>
      <div class="s-func">${fmt.func}</div>
      <div class="s-spacer"></div>
      <div class="s-meta">
        <span class="s-tier ${fmt.tier}">${fmt.tier==='free'?'Gratis':'Abonnement'}</span>
        <span class="s-freq">${fmt.freq}</span>
      </div>
      <div class="s-pillars">${pillars(fmt)}</div>
    </div>
    <div class="s-right">
      <div class="s-q">${fmt.q}</div>
      ${fmt.lead?`<div class="s-lead">${fmt.lead}</div>`:''}
      ${fmt.desc?`<div class="s-desc">${fmt.desc}</div>`:''}
      ${fmt.insight?`<div class="s-insight">${fmt.insight}</div>`:''}
      ${special(fmt)}
      <div class="s-sources"><b>Kilder ·</b> ${fmt.sources}</div>
    </div>`;
  slidesEl.appendChild(slide);

  /* Nav item */
  const btn=document.createElement('button');
  btn.className='bot-item';
  btn.textContent=fmt.num;
  btn.style.setProperty('--fc-active',fmt.color);
  btn.style.setProperty('--fc-rgb-active',fmt.colorRgb);
  btn.addEventListener('click',()=>goTo(i));
  botNav.appendChild(btn);
});

/* === NAVIGATION === */
let current=0;
const slides=()=>document.querySelectorAll('.slide');
const navItems=()=>document.querySelectorAll('.bot-item');
const counter=document.getElementById('botCount');

function goTo(idx){
  const sl=slides(); const ni=navItems();
  sl[current].classList.remove('active');
  ni[current].classList.remove('active');
  current=((idx%F.length)+F.length)%F.length;
  sl[current].classList.add('active');
  ni[current].classList.add('active');
  counter.textContent=`${current+1} / ${F.length}`;
  /* Synk header bg med dark slides */
  document.querySelector('.hdr').style.background=
    F[current].dark?'rgba(12,25,41,.97)':'rgba(250,250,248,.97)';
  document.querySelector('.hdr .brand').style.color=
    F[current].dark?F[current].color:'#361352';
  document.querySelector('.slide-id').style.color=
    F[current].dark?'rgba(255,255,255,.3)':'#7C7972';
  document.querySelector('.bot').style.background=
    F[current].dark?'rgba(12,25,41,.97)':'rgba(250,250,248,.97)';
}

document.getElementById('prev').addEventListener('click',()=>goTo(current-1));
document.getElementById('next').addEventListener('click',()=>goTo(current+1));
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') goTo(current+1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') goTo(current-1);
});

/* Start */
goTo(0);
</script>
