<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y Business — 04 · Formater</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=JetBrains+Mono:wght@400;500;700&family=Schibsted+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">
<style>
/* === VIEWPORT BASE === */
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#ECEAE4;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.deck-viewport{position:fixed;inset:0;overflow:hidden;background:#ECEAE4}
.deck-stage{position:absolute;left:0;top:0;width:1920px;height:1080px;
  overflow:hidden;transform-origin:0 0;background:#FAFAF8}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.1ms!important}}

/* === TOKENS === */
:root{
  --paper:#FAFAF8;--ink:#100C0C;--ink60:#5A5650;
  --muted:#7C7972;--line:#E4E2DD;--line2:#ECEAE4;--tint:#F4F2EC;
  --accent:#361352;
  --serif:'Playfair Display',Georgia,serif;
  --mono:'JetBrains Mono',monospace;
  --sans:'Schibsted Grotesk',system-ui,sans-serif;
  --ps:'Source Serif 4',Georgia,serif;
  --ease:cubic-bezier(.22,.61,.36,1);
}

/* === HEADER === */
.hdr{
  position:absolute;top:0;left:0;right:0;height:64px;z-index:60;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 52px;
  background:rgba(250,250,248,.97);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(20px);
}
.brand{font-family:var(--serif);font-size:21px;font-weight:700;
  color:var(--accent);font-style:italic}
.brand b{font-family:var(--mono);font-size:11px;font-weight:700;
  letter-spacing:.2em;color:var(--muted);font-style:normal;
  margin-left:14px;vertical-align:middle}
.slide-id{font-family:var(--mono);font-size:10px;font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}

/* === MAIN LAYOUT === */
.layout{
  position:absolute;top:64px;left:0;right:0;bottom:0;
  display:flex;
}

/* ===========================
   VENSTRE: FORMAT LISTE
   =========================== */
.fmt-nav{
  width:480px;flex-shrink:0;
  display:flex;flex-direction:column;
  border-right:1px solid var(--line);
  background:var(--paper);
}

/* Hvert format-item — alle samme flex-vægt, ingen accordion */
.fmt-item{
  flex:1;
  display:flex;align-items:center;
  overflow:hidden;
  cursor:pointer;
  border-bottom:1px solid var(--line2);
  transition:background .15s ease;
}
.fmt-item:last-child{border-bottom:none}

/* Farvet linker streng */
.fi-bar{
  width:4px;flex-shrink:0;height:100%;
  transition:width .25s var(--ease);
}
.fmt-item.active .fi-bar{width:7px}

/* Indhold — ét layout, typografi skalerer */
.fi-body{
  display:flex;flex-direction:column;justify-content:center;
  padding:0 18px;flex:1;min-width:0;gap:3px;
}

.fi-num{
  font-family:var(--mono);font-size:8.5px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  transition:color .2s ease;
  line-height:1;
}

/* Rubrikken — det centrale element der skalerer */
.fi-name{
  font-family:var(--serif);font-weight:700;
  letter-spacing:-.02em;line-height:1.0;
  color:var(--ink);
  font-size:16px;
  transition:font-size .32s var(--ease), color .2s ease, letter-spacing .32s ease;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.fmt-item.active .fi-name{
  font-size:30px;
  letter-spacing:-.03em;
  white-space:normal;
}

.fi-func{
  font-family:var(--mono);font-size:8px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);
  opacity:0;height:0;overflow:hidden;
  transition:opacity .2s ease .1s, height .3s var(--ease);
  line-height:1;
}
.fmt-item.active .fi-func{opacity:.7;height:13px}

.fi-tier{
  font-family:var(--mono);font-size:7px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  padding:2px 8px;border:1px solid;
  display:inline-block;align-self:flex-start;
  opacity:0;height:0;overflow:hidden;
  transition:opacity .2s ease .15s, height .3s var(--ease);
}
.fmt-item.active .fi-tier{opacity:1;height:18px}
.fi-tier.free{color:#A75D46;border-color:rgba(167,93,70,.4)}
.fi-tier.paid{color:inherit;border-color:currentColor;opacity:0}
.fmt-item.active .fi-tier.paid{opacity:.55}

/* ===========================
   HØJRE: INDHOLDSZONE
   =========================== */
.fmt-content{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  background:var(--paper);
  position:relative;overflow:hidden;
}

/* Slideshow af indholdsflader */
.content-slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  padding:40px 60px 36px 52px;
  opacity:0;pointer-events:none;
  transition:opacity .26s ease;
  overflow:hidden;
}
.content-slide.active{opacity:1;pointer-events:auto}

/* Øverst: stor spørgsmål-linje */
.cs-q{
  font-family:var(--ps);font-size:26px;font-style:italic;font-weight:300;
  line-height:1.42;color:var(--ink);
  margin-bottom:20px;
  max-width:62ch;flex-shrink:0;
}

/* Lead */
.cs-lead{
  font-family:var(--serif);font-size:16px;font-weight:700;
  letter-spacing:-.01em;line-height:1.35;
  margin-bottom:11px;flex-shrink:0;
}

/* Beskrivelse */
.cs-desc{
  font-family:var(--sans);font-size:15px;line-height:1.68;
  color:var(--ink60);margin-bottom:14px;
  max-width:70ch;flex-shrink:0;
}

/* Indsigt */
.cs-insight{
  padding:11px 16px;
  font-family:var(--ps);font-size:14px;font-style:italic;font-weight:300;
  line-height:1.55;color:var(--ink60);
  margin-bottom:14px;flex-shrink:0;max-width:70ch;
}

/* Citat (Klummerne) */
.cs-quote{
  font-family:var(--ps);font-size:18px;font-style:italic;font-weight:400;
  line-height:1.45;color:var(--ink);
  padding:10px 0;margin-bottom:12px;flex-shrink:0;
}

/* Special-label */
.cs-lbl{
  font-family:var(--mono);font-size:7.5px;font-weight:700;
  letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);margin-bottom:7px;flex-shrink:0;
}

/* Stat badge */
.cs-stat{
  font-family:var(--mono);font-size:9.5px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  padding:4px 12px;display:inline-block;
  margin-bottom:12px;flex-shrink:0;
}

/* Note / proto (ingen border-left) */
.cs-note{padding:10px 16px;margin-bottom:12px;flex-shrink:0;max-width:70ch}
.cs-note-lbl{font-family:var(--mono);font-size:7.5px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px}
.cs-note-txt{font-family:var(--sans);font-size:12.5px;line-height:1.5;color:var(--ink60)}

/* Blind Spot grid (3×2) */
.cs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;
  margin-bottom:10px;flex-shrink:0}
.cs-gi{padding:8px 11px}
.cs-gi-lbl{font-family:var(--mono);font-size:7.5px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.cs-gi-txt{font-family:var(--sans);font-size:10.5px;line-height:1.4;color:var(--ink60)}
.cs-grund{padding:8px 12px;margin-bottom:10px;flex-shrink:0}
.cs-grund-lbl{font-family:var(--mono);font-size:7.5px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px}
.cs-grund-txt{font-family:var(--sans);font-size:11.5px;line-height:1.5}

/* Situationsformater / klummekolonner */
.cs-cols{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;flex-shrink:0}
.cs-col{display:flex;align-items:baseline;gap:10px;padding:7px 12px}
.cs-col-n{font-family:var(--mono);font-size:8.5px;font-weight:700;
  letter-spacing:.08em;flex-shrink:0;min-width:80px}
.cs-col-txt{font-family:var(--sans);font-size:12.5px;line-height:1.4;color:var(--ink60)}

/* Navngivet badge (Klummerne) */
.cs-navngivet{
  font-family:var(--mono);font-size:8.5px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  display:flex;align-items:center;gap:7px;
  margin-bottom:10px;flex-shrink:0;
}
.cs-navngivet::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Kilder */
.cs-sources{
  font-family:var(--mono);font-size:9.5px;font-weight:500;
  color:var(--muted);line-height:1.5;
  padding-top:12px;border-top:1px solid var(--line2);
  margin-top:auto;flex-shrink:0;
}
.cs-sources b{font-weight:700}

/* Entry */
@keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.hdr{animation:slideDown .4s var(--ease) both}
.layout{animation:fadeUp .45s var(--ease) .1s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="deck-viewport">
<div class="deck-stage" id="stage">

<div class="hdr">
  <div class="brand">Y<b>Business</b></div>
  <div class="slide-id">04 · Formater</div>
</div>

<div class="layout">
  <div class="fmt-nav" id="fmtNav"></div>
  <div class="fmt-content" id="fmtContent"></div>
</div>

</div>
</div>
<script>
/* === SCALE === */
const stageEl=document.getElementById('stage');
function scaleStage(){
  const s=Math.min(window.innerWidth/1920,window.innerHeight/1080);
  stageEl.style.transform=
    `translate(${(window.innerWidth-1920*s)/2}px,${(window.innerHeight-1080*s)/2}px) scale(${s})`;
}
scaleStage(); window.addEventListener('resize',scaleStage);

/* === DATA === */
const F=[
  {
    num:'01',eyebrow:'01 · Basislag',name:'Brancheoverblikket',
    func:'Orienteringen',tier:'paid',
    color:'#5A4A72',tint:'rgba(90,74,114,',
    lead:'Det er ikke et fælles opslagstavleprodukt.',
    q:'"Hvad er sket i min branche siden sidst?"',
    desc:'Ikke alt behøver en vinkel. Noget behøver bare at blive fundet, sorteret og leveret, inden du åbner din første mail. Brancheoverblikket er personaliseret efter branche, region, emner og adfærd.',
    insight:null,pillars:['u'],freq:'Dagligt / løbende',

  },

    desc:'Ikke et temperament, men en redaktionel disciplin. Følger vores challenge-protokol og kræver altid en navngivet modkilde.',
    insight:null,pillars:['c'],freq:'Ugentligt',

  },

    lead:null,

    desc:'Systemet finder sprækken i ugens nyhedsbillede: det dokumenterede hul, den skæve fortælling, den dominerende ramme, den fraværende kilde. Journalisten triggerer — systemet returnerer et beslutningsklart signal med årsag.',

      items:[
        {l:'Dækningsgab',d:'Et væsentligt emne dækkes slet ikke.'},

      {n:'Før handlen',txt:'Intelligence om modpart, marked og risiko inden kontrakten skrives.'},
    ]},
  },
  {
    num:'08',eyebrow:'08 · Stemmen',name:'Klummerne',

    color:'#3B5949',tint:'rgba(59,89,73,',
    lead:null,
    q:'"Den personlige vurdering, erfaringen og ansvaret — med navn under."',

    pillars:['u','c','i'],freq:'Fast ugentlig',
    sources:'AI-praktikere, teknologiledere, founders og egne baggrundsanalyser.',
    special:{type:'klumme',
      quote:'"AI kan opsummere. Den kan ikke have noget på spil."',

      cols:[
        {n:'I',txt:'Mandag morgen — ledelsessignal og AI-konsekvens'},
        {n:'II',txt:'Den blinde vinkel — Challenge med navn og holdning'},
        {n:'III',txt:'Sådan gjorde jeg — case med skribent og friktion'},
      ],
    },
  },
];

/* === HELPERS === */
function pills(f){
  const m={u:'Understand',c:'Challenge',i:'Inspire'};
  return f.pillars.map(p=>`<span class="fo-pill ${p}">${m[p]}</span>`).join('');
}

function buildSpecial(f){
  const s=f.special; if(!s) return '';
  const bg=f.tint+'0.07)';
  const topB=`border-top:1px solid ${f.tint}0.35)`;

  if(s.type==='stat') return `
    <div class="cs-stat" style="background:${f.tint}0.1);color:${f.color}">${s.txt}</div>`;

  if(s.type==='proto') return `
    <div class="cs-note" style="background:${bg}">
      <div class="cs-note-lbl" style="color:${f.color}">${s.lbl}</div>
      <div class="cs-note-txt">${s.desc}</div>
    </div>`;

  if(s.type==='note') return `
    <div class="cs-note" style="background:${bg}">
      <div class="cs-note-lbl" style="color:${f.color}">${s.lbl}</div>
      <div class="cs-note-txt">${s.desc}</div>
    </div>`;

  if(s.type==='cols') return `
    <div class="cs-lbl">Tre formater</div>
    <div class="cs-cols">
      ${s.items.map(it=>`<div class="cs-col" style="background:${bg}">
        <span class="cs-col-n" style="color:${f.color}">${it.n}</span>
        <span class="cs-col-txt">${it.txt}</span>
      </div>`).join('')}
    </div>`;

  if(s.type==='blindspot') return `
    <div class="cs-lbl">Seks typer blind spot</div>
    <div class="cs-grid">
      ${s.items.map(it=>`<div class="cs-gi" style="background:${bg};${topB}">
        <div class="cs-gi-lbl" style="color:${f.color}">${it.l}</div>
        <div class="cs-gi-txt">${it.d}</div>
      </div>`).join('')}
    </div>
    <div class="cs-grund" style="background:${f.tint}0.08)">
      <div class="cs-grund-lbl" style="color:${f.color}">Grundregel</div>
      <div class="cs-grund-txt">${s.grundregel}</div>
    </div>`;

  if(s.type==='klumme') return `
    <div class="cs-quote">${s.quote}</div>
    <div class="cs-navngivet" style="color:${f.color}">
      <span>${s.note}</span>
    </div>
    <div class="cs-lbl">Tre klummetyper</div>
    <div class="cs-cols">
      ${s.cols.map(c=>`<div class="cs-col" style="background:${bg}">
        <span class="cs-col-n" style="color:${f.color}">${c.n}</span>
        <span class="cs-col-txt">${c.txt}</span>
      </div>`).join('')}
    </div>`;

  return '';
}

/* === BUILD DOM === */
const nav=document.getElementById('fmtNav');
const content=document.getElementById('fmtContent');
let activeIdx=1; // Morgenbriefet default

F.forEach((f,i)=>{
  /* --- FORMAT ITEM (venstre) --- */
  const item=document.createElement('div');
  item.className='fmt-item'+(i===activeIdx?' active':'');
  item.style.background=f.tint+'0.06)';

  item.innerHTML=`
    <div class="fi-bar" style="background:${f.color}"></div>
    <div class="fi-body">
      <span class="fi-num" style="color:${f.color}">${f.num} · ${f.func.toUpperCase()}</span>
      <span class="fi-name">${f.name}</span>
      <span class="fi-func">${f.freq}</span>
      <span class="fi-tier ${f.tier}" style="color:${f.tier==='free'?'#A75D46':f.color};border-color:${f.tier==='free'?'rgba(167,93,70,.4)':f.color+'55'}">${f.tier==='free'?'Gratis':'Abonnement'}</span>
    </div>`;

  item.style.setProperty('--fc',f.color);
  item.addEventListener('click',()=>goTo(i));
  nav.appendChild(item);

  /* --- INDHOLDSFLADER (højre) --- */
  const slide=document.createElement('div');
  slide.className='content-slide'+(i===activeIdx?' active':'');

  slide.innerHTML=`
    ${f.lead?`<div class="cs-lead" style="color:${f.color}">${f.lead}</div>`:''}
    <div class="cs-q">${f.q}</div>
    ${f.desc?`<div class="cs-desc">${f.desc}</div>`:''}
    ${f.insight?`<div class="cs-insight" style="background:${f.tint}0.08)">${f.insight}</div>`:''}
    ${buildSpecial(f)}
    <div class="cs-sources"><b style="color:${f.color}">Kilder ·</b> ${f.sources}</div>`;

  content.appendChild(slide);
});

/* === NAVIGATION === */
function goTo(idx){
  const items=document.querySelectorAll('.fmt-item');
  const slides=document.querySelectorAll('.content-slide');
  items[activeIdx].classList.remove('active');
  slides[activeIdx].classList.remove('active');
  activeIdx=idx;
  items[activeIdx].classList.add('active');
  slides[activeIdx].classList.add('active');
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown') goTo((activeIdx+1)%F.length);
  if(e.key==='ArrowUp') goTo((activeIdx-1+F.length)%F.length);
});
</script>
</body>
</html>
